# 全局运行配置

collector:
  request_delay: 1.5
  max_retries: 3
  timeout: 30
  official_max_papers: 800   # 单会议官网最大采集论文数
  user_agent: "Mozilla/5.0 (compatible; ConferenceTracker/1.0; +https://github.com)"

# 机构信息补全（可选，用于官网论文缺少机构时）
enrichment:
  enabled: false
  max_papers_per_conference: 50
  max_author_fallback_papers: 0
  max_authors_per_paper: 4
  request_delay: 0.12
  openalex_mailto: "conference-tracker@users.noreply.github.com"

# 科技新闻网站
tech_news:
  sites:
    - name: 机器之心
      url: https://www.jiqizhixin.com
      list_path: /articles
      search_url: "https://www.jiqizhixin.com/search?q={query}"
      max_articles: 10
      enabled: true

    - name: 量子位
      url: https://www.qbitai.com
      list_path: /
      search_url: "https://www.qbitai.com/?s={query}"
      max_articles: 10
      enabled: true

    - name: 雷锋网
      url: https://www.leiphone.com
      list_path: /category/academic
      search_url: "https://www.leiphone.com/search?q={query}"
      max_articles: 8
      enabled: true

    - name: 新智元
      url: https://www.aiust.com
      list_path: /
      max_articles: 8
      enabled: true

# 高校官网（院系新闻页）
university_news:
  sites:
    - name: 清华大学计算机系
      affiliation: 清华大学
      url: https://www.cs.tsinghua.edu.cn
      news_paths:
        - /index/xwdt.htm
        - /index/kydt.htm
      max_articles: 15
      enabled: true

    - name: 北京大学计算机学院
      affiliation: 北京大学
      url: https://cs.pku.edu.cn
      news_paths:
        - /
      max_articles: 15
      enabled: true

    - name: 上海交通大学计算机系
      affiliation: 上海交通大学
      url: https://www.cs.sjtu.edu.cn
      news_paths:
        - /index/xwdt.htm
      max_articles: 10
      enabled: true

    - name: 浙江大学计算机学院
      affiliation: 浙江大学
      url: http://www.cs.zju.edu.cn
      news_paths:
        - /chinese/
      max_articles: 10
      enabled: true

    - name: 南京大学计算机系
      affiliation: 南京大学
      url: https://cs.nju.edu.cn
      news_paths:
        - /main.htm
      max_articles: 10
      enabled: true

    - name: 中科大计算机学院
      affiliation: 中国科学技术大学
      url: http://cs.ustc.edu.cn
      news_paths:
        - /
      max_articles: 10
      enabled: true

# 微信公众号
wechat:
  use_sogou_search: true
  max_articles_per_query: 6
  accounts:
    - name: 机器之心
      affiliation: null
      article_pages: []
      enabled: true

    - name: 量子位
      affiliation: null
      article_pages: []
      enabled: true

    - name: 新智元
      affiliation: null
      article_pages: []
      enabled: true

    - name: 清华计算机系
      affiliation: 清华大学
      article_pages: []
      enabled: true

output:
  report_dir: reports
  cache_dir: data
  report_filename: 2026-H2-conferences.md

git:
  reports_path: reports
  commit_prefix: "Auto update"
