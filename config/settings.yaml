# 全局运行配置

collector:
  request_delay: 3.0          # arXiv 要求 >= 3 秒
  max_retries: 3
  timeout: 30
  user_agent: "Mozilla/5.0 (compatible; ConferenceTracker/1.0; +https://github.com)"

arxiv:
  api_base: "http://export.arxiv.org/api/query"
  max_results_per_conference: 200
  page_size: 100

# 机构信息补全（OpenAlex，arXiv 无机构信息时使用）
enrichment:
  enabled: true
  max_papers_per_conference: 100
  max_author_fallback_papers: 30
  max_authors_per_paper: 4
  request_delay: 0.15
  openalex_mailto: "conference-tracker@users.noreply.github.com"

# 中文名推断
chinese_name:
  enabled: true
  confidence_threshold: 0.7

output:
  report_dir: reports
  cache_dir: data
  report_filename: 2026-H2-conferences.md

git:
  reports_path: reports
  commit_prefix: "Auto update"
