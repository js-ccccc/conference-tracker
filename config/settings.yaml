# 全局运行配置

collector:
  request_delay: 3.0          # arXiv 要求 >= 3 秒
  max_retries: 3
  timeout: 30
  user_agent: "Mozilla/5.0 (compatible; ConferenceTracker/1.0; +https://github.com)"

arxiv:
  api_base: "http://export.arxiv.org/api/query"
  max_results_per_conference: 50
  page_size: 50

# 机构信息补全（通过 OpenAlex 按标题查找）
# CI 默认关闭（OpenAlex 限流严重），本地可用 --enrich 开启
enrichment:
  enabled: false
  max_papers_per_conference: 30
  max_author_fallback_papers: 0
  max_authors_per_paper: 3
  request_delay: 0.2
  openalex_mailto: "conference-tracker@users.noreply.github.com"

# 中文名推断
chinese_name:
  enabled: true
  confidence_threshold: 0.7

output:
  report_dir: reports
  cache_dir: data
  report_filename: 2026-H2-conferences.md

git:
  reports_path: reports
  commit_prefix: "Auto update"
